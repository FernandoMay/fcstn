services:
  - type: web
    name: fcstn-server
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn deploy_server:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
    healthCheckPath: /health
